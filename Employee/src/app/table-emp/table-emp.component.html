<div class="new_table">
  <h3 style="text-align:center; margin-top:4%; text-decoration: solid;">Employees Details</h3>
  <table  class="table table-hover" style="width: 70%;margin-top: 4%;">
    <thead class="table-dark">
      <tr>
        <th scope="col">Id</th>
        <th scope="col">Name</th>
        <th scope="col">Role</th>
        <th scope="col">Salary</th>
        <th scope="col">Location</th>
        <th scope="col"></th>
      </tr>
    </thead>
    <tbody class="table-primary">
      <tr *ngFor="let emp of employees |async">
        <td>{{emp.id}}</td>
        <td>{{emp.name}}</td>
        <td>{{emp.role}}</td>
        <td>{{emp.salary}}</td>
        <td>{{emp.location}}</td>
        <td><button class="btn btn-outline-danger" (click)="deleteEmp(emp.id)">Delete</button></td>
      </tr>
    </tbody><pre></pre>
    <button type="button"  class="btn btn-secondary" routerLink="/home" style="padding: 10px 40px;">Back</button>
  </table>
  
  </div>
